services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payouts
      POSTGRES_USER: payout
      POSTGRES_PASSWORD: payout
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payout -d payouts"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
  app:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://payout:payout@db:5432/payouts
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-development-only-key}
      ADVANCE_JOB_ENABLED: ${ADVANCE_JOB_ENABLED:-true}
      ADVANCE_JOB_CRON: ${ADVANCE_JOB_CRON:-*/5 * * * *}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 6
    ports:
      - "8000:8000"

volumes:
  postgres_data:
